<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JEXONGO</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <!-- PRACTICE MODE SELECTOR -->
  <div id="practice-select" class="sett-backdrop hidden">
    <div class="practice-panel">
      <div class="sett-header">
        <span class="sett-title">⚡ PRACTICE</span>
        <button id="btn-practice-close" class="sett-close">✕</button>
      </div>
      <div class="practice-body">
        <div class="practice-subtitle">CHOOSE OPERATIONS</div>
        <div class="practice-ops-grid">
          <button class="practice-op-btn pob-active" data-op="+" style="--op-color:#00e84b">
            <span class="pob-symbol">+</span>
            <span class="pob-label">ADD</span>
          </button>
          <button class="practice-op-btn pob-active" data-op="-" style="--op-color:#60a5fa">
            <span class="pob-symbol">−</span>
            <span class="pob-label">SUB</span>
          </button>
          <button class="practice-op-btn pob-active" data-op="*" style="--op-color:#ff8c00">
            <span class="pob-symbol">×</span>
            <span class="pob-label">MUL</span>
          </button>
          <button class="practice-op-btn pob-active" data-op="/" style="--op-color:#a855f7">
            <span class="pob-symbol">÷</span>
            <span class="pob-label">DIV</span>
          </button>
        </div>
        <button id="btn-practice-all" class="practice-all-btn">SELECT ALL</button>

        <div class="practice-hearts-row">
          <span class="practice-hearts-label">❤ LIVES</span>
          <button id="btn-practice-hearts" class="practice-hearts-btn poh-active">ON</button>
        </div>

        <button id="btn-practice-start" class="btn btn-primary practice-start-btn">▶ START</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS PANEL (global overlay) -->
  <div id="settings-panel" class="sett-backdrop hidden">
    <div class="sett-panel">
      <div class="sett-header">
        <span class="sett-title">⚙ SETTINGS</span>
        <button id="btn-settings-close" class="sett-close">✕</button>
      </div>

      <div class="sett-row sett-row-volume">
        <div class="sett-row-left">
          <span class="sett-icon" id="sett-vol-icon">🔊</span>
          <span class="sett-label">VOLUME</span>
        </div>
        <div class="sett-slider-wrap">
          <input type="range" id="sett-volume-slider" class="sett-slider" min="0" max="100" value="80">
          <span id="sett-volume-val" class="sett-vol-val">80%</span>
        </div>
      </div>

      <div class="sett-row">
        <div class="sett-row-left">
          <span class="sett-icon">✨</span>
          <span class="sett-label">EFFECTS</span>
        </div>
        <button id="sett-effects" class="sett-toggle sett-on">ON</button>
      </div>

      <div class="sett-divider"></div>

      <div class="sett-controls-title">🕹 CONTROLS</div>
      <div class="sett-controls-grid">
        <div class="sett-key-row"><span class="sett-key">← →</span><span class="sett-key-desc">MOVE</span></div>
        <div class="sett-key-row"><span class="sett-key">↑ ↓</span><span class="sett-key-desc">MOVE</span></div>
        <div class="sett-key-row"><span class="sett-key">WASD</span><span class="sett-key-desc">MOVE</span></div>
        <div class="sett-key-row"><span class="sett-key">TAP</span><span class="sett-key-desc">MOVE</span></div>
      </div>
    </div>
  </div>

  <!-- MENU SCREEN -->
  <div id="s-menu" class="screen">
    <video id="menu-bg-video" autoplay loop muted playsinline poster="/public/assets/menu/lobby-bg.png">
      <source src="/public/assets/menu/bg-motion-2.mp4" type="video/mp4">
      <source src="/public/assets/menu/bg-motion-1.mp4" type="video/mp4">
    </video>
    <canvas id="menu-canvas"></canvas>
    <button id="btn-settings" class="settings-gear-btn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
        <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.74-.07-1.08l2.32-1.82c.21-.17.27-.46.14-.7l-2.2-3.82c-.13-.24-.42-.31-.66-.22l-2.73 1.1c-.57-.44-1.18-.8-1.86-1.09l-.41-2.9A.54.54 0 0 0 14 2h-4a.54.54 0 0 0-.54.46l-.41 2.9c-.68.29-1.29.65-1.86 1.09l-2.73-1.1c-.24-.09-.53-.02-.66.22L1.6 9.49c-.13.24-.07.53.14.7l2.32 1.82C4.03 12.35 4 12.69 4 13s.03.65.07.99L1.74 15.8c-.21.17-.27.46-.14.7l2.2 3.82c.13.24.42.31.66.22l2.73-1.1c.57.44 1.18.8 1.86 1.09l.41 2.9c.06.28.28.46.54.46h4c.26 0 .48-.18.54-.46l.41-2.9c.68-.29 1.29-.65 1.86-1.09l2.73 1.1c.24.09.53.02.66-.22l2.2-3.82c.13-.24.07-.53-.14-.7l-2.32-1.81z"/>
      </svg>
    </button>
    <div class="menu-content">
      <div class="menu-logo">JEXON<span class="logo-go">GO</span></div>
      <div class="menu-subtitle">AERIAL MATH COMBAT</div>
      <button id="btn-play" class="btn btn-primary">▶ PLAY</button>
      <button id="btn-hangar" class="btn btn-secondary">✈ HANGAR</button>
      <button id="btn-shop" class="btn btn-secondary">🛍 SHOP</button>
      <button id="btn-practice" class="btn btn-secondary">⚡ PRACTICE</button>

      <div class="login-divider"><span>— SIGN IN —</span></div>

      <button class="login-btn login-google" id="btn-login-google" aria-label="Sign in with Google">
        <svg class="login-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span class="login-btn-text">SIGN IN WITH GOOGLE</span>
      </button>

      <button class="login-btn login-apple" id="btn-login-apple" aria-label="Sign in with Apple">
        <svg class="login-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.42c1.29.07 2.18.77 2.93.8.98-.2 1.94-.92 3.21-.99 1.37-.08 2.6.52 3.33 1.4-3.02 1.83-2.5 5.85.41 7.08-.51 1.46-1.2 2.91-1.88 3.57zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
        <span class="login-btn-text">SIGN IN WITH APPLE</span>
      </button>
    </div>
  </div>

  <!-- LEVEL MAP SCREEN -->
  <div id="s-levelmap" class="screen hidden">
    <div class="top-bar">
      <button id="btn-map-back" class="btn-icon">&#8592;</button>
      <span class="top-bar-title">SELECT MISSION</span>
      <span id="map-xp-display" class="xp-badge">0 XP</span>
    </div>
    <div id="levelmap-scroll">
      <div id="levelmap-nodes"></div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="s-game" class="screen hidden">
    <div id="game-hud">
      <div id="hud-lives"></div>
      <div id="hud-level">Level 1</div>
      <div id="hud-streak"></div>
      <button id="btn-quit-game" class="btn-quit-game">&#x2715; QUIT</button>
    </div>
    <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
    <div id="game-canvas-wrap">
      <canvas id="game-canvas"></canvas>
      <div id="game-pause-overlay"></div>
      <div id="question-box">
        <div id="question-text"></div>
        <div id="answer-buttons"></div>
        <div id="correct-answer-reveal" class="hidden">
          <div class="car-step" id="car-step1"></div>
          <div class="car-step" id="car-step2"></div>
          <div class="car-step" id="car-step3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- HANGAR SCREEN -->
  <div id="s-hangar" class="screen hidden">
    <div class="top-bar">
      <button id="btn-hangar-back" class="btn-icon">&#8592;</button>
      <span class="top-bar-title">HANGAR</span>
      <span id="hangar-xp" class="xp-badge">0 XP</span>
    </div>
    <div id="hangar-grid"></div>
    <div id="hangar-livery-panel" class="hangar-livery-panel hidden"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="s-result" class="screen hidden">
    <div id="result-title">MISSION COMPLETE</div>
    <div id="result-stars"></div>
    <div id="result-xp"></div>
    <div id="result-correct"></div>
    <button id="btn-result-continue" class="btn btn-primary">CONTINUE</button>
    <button id="btn-result-retry" class="btn btn-secondary">RETRY</button>
  </div>

  <!-- CHEST SCREEN -->
  <div id="s-chest" class="screen hidden">
    <div id="chest-title">CHEST REWARD</div>
    <div id="chest-tier-label"></div>
    <div id="chest-box"><img id="chest-img" src="" alt="chest"></div>
    <div id="chest-rewards" class="hidden"></div>
    <button id="btn-chest-open" class="btn btn-primary">OPEN CHEST</button>
    <button id="btn-chest-continue" class="btn btn-secondary hidden">CONTINUE</button>
  </div>

  <!-- SHOP SCREEN -->
  <div id="s-shop" class="screen hidden">

    <!-- Top bar -->
    <div class="shop-topbar">
      <button id="btn-shop-back" class="shop-back-btn">&#8592;</button>
      <span class="shop-topbar-title">SHOP</span>
      <div class="shop-currencies">
        <span id="shop-coins" class="shop-currency-badge shop-currency-coins">🪙 <span id="shop-coins-val">0</span></span>
      </div>
    </div>

    <!-- Scrollable content -->
    <div id="shop-content" class="shop-content"></div>
    <div id="shop-error" class="shop-error-bar"></div>

    <!-- Bottom tab bar -->
    <div class="shop-tabbar">
      <button class="shop-tab shop-tab-active" data-tab="offers">
        <span class="shop-tab-icon">🎁</span><span class="shop-tab-label">OFFERS</span>
      </button>
      <button class="shop-tab" data-tab="skins">
        <span class="shop-tab-icon">✈</span><span class="shop-tab-label">SKINS</span>
      </button>
      <button class="shop-tab" data-tab="more">
        <span class="shop-tab-icon">⋯</span><span class="shop-tab-label">MORE</span>
      </button>
    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="s-gameover" class="screen hidden">
    <div id="gameover-title">GAME OVER</div>
    <div id="gameover-score"></div>
    <button id="btn-retry" class="btn btn-primary">RETRY</button>
    <button id="btn-go-map" class="btn btn-secondary">LOBBY</button>
  </div>

  <div id="login-toast"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
